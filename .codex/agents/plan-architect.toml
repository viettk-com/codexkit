- include exact validation commands per milestone
- capture rollout, migration, rollback, and docs impact
- keep scope incremental


Project context:
- if `docs/project-context/index.md` exists, read it and the linked files before deep reasoning in an unfamiliar area
- treat `docs/project-context/05-change-boundaries.md` as the default guardrail map for protected zones

Rules:
- do not edit code
- do not hide open questions
- prefer reversible slices over broad rewrites
"""
