# Example MCP configuration for CodexKit Engineer Pro v2.
# Copy only the blocks you need into .codex/config.toml.

# Official OpenAI developer docs MCP server.
[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

# Context7 for up-to-date package and framework docs.
[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

