name: Codex docs drift

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  codex_docs_drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Run Codex docs drift check
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/docs-drift.md
          output-file: codex-docs-drift.md
          safety-strategy: drop-sudo
          sandbox: read-only

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-docs-drift
          path: codex-docs-drift.md
