name: Codex architecture gate

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  codex_architecture_gate:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'architecture-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5

      - name: Run Codex architecture gate
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/architecture-review.md
          output-file: codex-architecture-review.md
          safety-strategy: drop-sudo
          sandbox: read-only

      - name: Upload architecture report
        uses: actions/upload-artifact@v4
        with:
          name: codex-architecture-review
          path: codex-architecture-review.md

      - name: Comment architecture summary
        if: steps.run_codex.outputs.final-message != '' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
